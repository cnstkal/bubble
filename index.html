<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CLOW bubble</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#050505;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{--pink:#e91e8c;--pink2:#ff4db2;--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#2a2a2a;--border:#1e1e1e;--t1:#fff;--t2:#aaa;--t3:#555;}

#app{width:390px;height:760px;background:#0a0a0a;position:relative;overflow:hidden;border-radius:44px;box-shadow:0 0 0 1px #222,0 40px 80px rgba(0,0,0,0.8);}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#0a0a0a;transition:transform .28s cubic-bezier(.4,0,.2,1);}
.screen.off-right{transform:translateX(100%);}
.screen.off-left{transform:translateX(-100%);}

/* SPLASH */
#splash{align-items:center;justify-content:center;background:#0a0a0a;}
.splash-logo-text{font-size:52px;font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#ff4db2,#e91e8c,#b5166e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.splash-sub{font-size:11px;color:#444;letter-spacing:5px;margin-top:6px;text-align:center;}
.splash-dot{width:6px;height:6px;background:#e91e8c;border-radius:50%;margin:28px auto 0;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* STATUS BAR */
.status-bar{padding:14px 24px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.status-time{font-size:15px;font-weight:600;color:#fff;}
.status-icons{display:flex;gap:6px;align-items:center;font-size:12px;color:#fff;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 10px;flex-shrink:0;}
.brand{font-size:24px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#ff4db2,#e91e8c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.top-actions{display:flex;gap:4px;}
.icon-btn{width:36px;height:36px;background:none;border:none;color:#555;cursor:pointer;font-size:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.icon-btn:hover{background:#1a1a1a;color:#e91e8c;}

/* TAB BAR */
.tab-bar{display:flex;border-bottom:.5px solid #181818;flex-shrink:0;}
.tab-btn{flex:1;padding:13px 0 11px;font-size:13px;font-weight:500;color:#444;background:none;border:none;cursor:pointer;position:relative;transition:color .15s;}
.tab-btn.active{color:#e91e8c;}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:#e91e8c;border-radius:2px;}

/* SCROLL AREAS */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}

/* MEMBER LIST */
.member-item{display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;transition:background .12s;position:relative;}
.member-item:active{background:#111;}
.divider-line{height:.5px;background:#111;margin:0 20px;}

.av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;position:relative;}
.lock-badge{position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;background:#0a0a0a;border-radius:50%;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:9px;}

.m-info{flex:1;min-width:0;}
.m-name{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-preview{font-size:13px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
.m-meta{text-align:right;flex-shrink:0;}
.m-time{font-size:11px;color:#444;}
.m-dday{font-size:11px;color:#e91e8c;font-weight:600;margin-top:4px;}
.m-sub-label{font-size:12px;color:#e91e8c;font-weight:500;margin-top:4px;}

/* CHAT */
.chat-header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:.5px solid #181818;flex-shrink:0;}
.back-btn{background:none;border:none;color:#e91e8c;font-size:26px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
.chat-hav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.chat-h-info{flex:1;min-width:0;}
.chat-h-name{font-size:16px;font-weight:700;color:#fff;}
.chat-h-sub{font-size:11px;color:#555;margin-top:1px;}
.dday-chip{background:#180a10;border:.5px solid #3a1028;border-radius:10px;padding:3px 10px;font-size:11px;color:#e91e8c;font-weight:600;flex-shrink:0;}

.msgs{flex:1;overflow-y:auto;padding:12px 16px 8px;display:flex;flex-direction:column;gap:6px;}
.msgs::-webkit-scrollbar{display:none;}

.msg-row{display:flex;align-items:flex-end;gap:7px;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.bubble{max-width:68%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.bubble.theirs{background:#1c1c1c;color:#f0f0f0;border-bottom-left-radius:4px;}
.bubble.mine{background:#e91e8c;color:#fff;border-bottom-right-radius:4px;}
.msg-t{font-size:10px;color:#3a3a3a;margin-bottom:2px;flex-shrink:0;}

.date-sep{text-align:center;font-size:11px;color:#333;margin:8px 0;position:relative;}
.date-sep::before{content:'';position:absolute;left:0;right:0;top:50%;height:.5px;background:#181818;}
.date-sep span{background:#0a0a0a;position:relative;padding:0 10px;}

.typing-row{display:flex;align-items:flex-end;gap:7px;}
.typing-bubble{background:#1c1c1c;padding:10px 16px;border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center;}
.dot{width:5px;height:5px;background:#555;border-radius:50%;animation:td 1.1s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.input-area{padding:8px 14px 20px;border-top:.5px solid #181818;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.msg-input{flex:1;background:#181818;border:.5px solid #252525;border-radius:22px;padding:10px 16px;font-size:14px;color:#fff;outline:none;resize:none;max-height:100px;line-height:1.4;font-family:inherit;transition:border-color .15s;}
.msg-input:focus{border-color:#3a1028;}
.msg-input::placeholder{color:#444;}
.send-btn{width:40px;height:40px;border-radius:50%;background:#e91e8c;border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s,background .15s;}
.send-btn:active{transform:scale(.9);}
.send-btn:disabled{background:#2a0a1a;cursor:not-allowed;}

/* SUBSCRIPTION MODAL */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;justify-content:flex-end;z-index:50;}
.modal-sheet{background:#141414;border-radius:24px 24px 0 0;padding:20px 22px 34px;}
.modal-handle{width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:0 auto 20px;}
.modal-member-row{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.modal-title{font-size:19px;font-weight:700;margin-bottom:8px;}
.modal-desc{font-size:13px;color:#666;line-height:1.6;margin-bottom:18px;}
.price-box{background:#0d0d0d;border-radius:14px;padding:16px 18px;margin-bottom:18px;border:.5px solid #1e1e1e;}
.price-row{display:flex;justify-content:space-between;align-items:center;}
.price-label{font-size:14px;color:#888;}
.price-amount{font-size:22px;font-weight:700;color:#e91e8c;}
.price-period{font-size:12px;color:#444;margin-top:4px;text-align:right;}
.modal-cta{width:100%;padding:16px;background:#e91e8c;border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;}
.modal-cta:active{background:#c01870;}
.modal-cancel-btn{width:100%;padding:12px;background:none;border:none;color:#444;font-size:14px;cursor:pointer;margin-top:6px;}

/* PROFILE */
.profile-scroll{flex:1;overflow-y:auto;}
.profile-scroll::-webkit-scrollbar{display:none;}
.profile-hero{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;}
.profile-av-wrap{position:relative;width:84px;height:84px;cursor:pointer;}
.profile-av{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;background:#180a14;border:2px solid #3a1028;}
.profile-av-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;background:#e91e8c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
.profile-name{font-size:19px;font-weight:700;margin-top:12px;}
.sec-label{font-size:11px;color:#444;font-weight:600;letter-spacing:1.2px;padding:16px 20px 8px;text-transform:uppercase;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:.5px solid #111;cursor:pointer;transition:background .12s;}
.setting-row:active{background:#111;}
.s-label{font-size:15px;color:#fff;}
.s-val{font-size:14px;color:#555;display:flex;align-items:center;gap:6px;}
.hint-box{margin:12px 20px;background:#120a10;border:.5px solid #2a1020;border-radius:12px;padding:14px 16px;font-size:12px;color:#666;line-height:1.7;}

/* EDIT MODAL (full screen) */
.edit-screen{position:absolute;inset:0;background:#0e0e0e;z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
.edit-screen.open{transform:translateY(0);}
.edit-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:.5px solid #1e1e1e;flex-shrink:0;}
.edit-hdr-title{font-size:16px;font-weight:600;}
.e-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:4px 0;}
.e-cancel{color:#666;}
.e-save{color:#e91e8c;font-weight:600;}
.edit-body{padding:24px 20px;flex:1;overflow-y:auto;}
.e-label{font-size:12px;color:#555;font-weight:500;margin-bottom:8px;letter-spacing:.5px;}
.e-input{width:100%;background:#0a0a0a;border:.5px solid #2a2a2a;border-radius:12px;padding:13px 16px;font-size:15px;color:#fff;outline:none;font-family:inherit;transition:border-color .15s;margin-bottom:8px;}
.e-input:focus{border-color:#e91e8c;}
.e-hint{font-size:12px;color:#3a3a3a;margin-bottom:20px;line-height:1.6;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;}
.emoji-opt{font-size:28px;cursor:pointer;padding:8px;border-radius:10px;background:#141414;transition:background .12s;}
.emoji-opt:hover{background:#1e1e1e;}

/* ADMIN */
.admin-hdr{padding:18px 20px 14px;flex-shrink:0;}
.admin-title{font-size:20px;font-weight:700;}
.admin-sub{font-size:13px;color:#444;margin-top:4px;}
.admin-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:.5px solid #111;cursor:pointer;transition:background .12s;}
.admin-row:active{background:#111;}
.admin-info{flex:1;min-width:0;}
.admin-name{font-size:15px;font-weight:600;}
.admin-pos{font-size:12px;color:#555;margin-top:2px;}

/* SUB LIST */
.unsub-btn{background:none;border:.5px solid #2a2a2a;border-radius:8px;color:#444;font-size:12px;padding:5px 12px;cursor:pointer;transition:border-color .15s,color .15s;margin:0 20px 12px;}
.unsub-btn:hover{border-color:#e91e8c;color:#e91e8c;}

.empty-state{text-align:center;color:#333;padding:70px 30px;font-size:14px;line-height:1.8;}
.empty-state span{color:#e91e8c;font-size:13px;}
</style>
</head>
<body>
<div id="app">

  <!-- SPLASH -->
  <div class="screen" id="splash">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;">
      <div class="splash-logo-text">CLOW</div>
      <div class="splash-sub">bubble</div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen off-right" id="home">
    <div class="status-bar">
      <div class="status-time" id="status-time">12:00</div>
      <div class="status-icons">▲▲ WiFi 🔋</div>
    </div>
    <div class="top-bar">
      <div class="brand">bubble</div>
      <div class="top-actions">
        <button class="icon-btn" onclick="goAdmin()" title="관리자">⚙️</button>
        <button class="icon-btn" onclick="switchTab('profile')" title="프로필">👤</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-msg" onclick="switchTab('msg')">메시지</button>
      <button class="tab-btn" id="tab-sub" onclick="switchTab('sub')">구독</button>
      <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">MY</button>
    </div>
    <div class="scroll-area" id="content-msg"></div>
    <div class="scroll-area" id="content-sub" style="display:none;"></div>
    <div class="scroll-area" id="content-profile" style="display:none;"></div>
  </div>

  <!-- CHAT -->
  <div class="screen off-right" id="chat">
    <div class="status-bar">
      <div class="status-time" id="chat-status-time">12:00</div>
      <div class="status-icons">▲▲ WiFi 🔋</div>
    </div>
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">‹</button>
      <div class="chat-hav" id="chat-hav"></div>
      <div class="chat-h-info">
        <div class="chat-h-name" id="chat-h-name"></div>
        <div class="chat-h-sub" id="chat-h-sub"></div>
      </div>
      <div class="dday-chip" id="dday-chip"></div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="input-area">
      <textarea class="msg-input" id="msg-input" placeholder="메시지 입력..." rows="1"
        onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="screen off-right" id="admin">
    <div class="status-bar"><div class="status-time" id="admin-time">12:00</div><div class="status-icons">▲▲ WiFi 🔋</div></div>
    <div class="admin-hdr">
      <button class="back-btn" onclick="goBack()" style="margin-bottom:8px;">‹</button>
      <div class="admin-title">관리자 모드</div>
      <div class="admin-sub">멤버 프로필 편집</div>
    </div>
    <div class="scroll-area" id="admin-list"></div>
  </div>

  <!-- SUB MODAL -->
  <div class="modal-bg" id="sub-modal" style="display:none;">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-member-row" id="modal-member-row"></div>
      <div class="modal-title">버블 구독하기</div>
      <div class="modal-desc">이 멤버의 일상 메시지를 받아보세요.<br>구독 즉시 인사 메시지가 도착합니다.</div>
      <div class="price-box">
        <div class="price-row">
          <div class="price-label">월 구독료</div>
          <div class="price-amount">₩5,000</div>
        </div>
        <div class="price-period">/ 월 · 언제든지 해지 가능</div>
      </div>
      <button class="modal-cta" onclick="doSubscribe()">구독 시작하기</button>
      <button class="modal-cancel-btn" onclick="closeSubModal()">취소</button>
    </div>
  </div>

  <!-- EDIT SCREEN -->
  <div class="edit-screen" id="edit-screen">
    <div class="edit-hdr">
      <button class="e-btn e-cancel" onclick="closeEdit()">취소</button>
      <div class="edit-hdr-title" id="edit-title">편집</div>
      <button class="e-btn e-save" id="e-save-btn" onclick="saveEdit()">저장</button>
    </div>
    <div class="edit-body" id="edit-body"></div>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────
const MEMBERS = [
  {
    id:'shanrui', emoji:'🌸', name:'션린위', pos:'리더 · 메인보컬', color:'#8e5ea2',
    prompt:`너는 CLOW의 리더이자 맏언니 션린위야. 2003년생, 중국 상하이 출신. 한국어 수준급. 존댓말 80% 반말 20% 비율. 우아하고 좀처럼 흥분 안 해. 담담하게 일상을 말하는 스타일. 짧고 담백하게 써. 감탄사/이모티콘 절제. 친근하지만 약간의 거리감. 1~2문장으로 써. 팬 호칭은 @@.`,
    greet:'오랜만이에요. 잘 지내고 있죠?',
    subscribed:false, subDate:null, history:[]

  {

    prompt:`너는 CLOW 멤버 윤해인. 2004년생. 무조건 반말. 성격 살짝 찐따 같음. 실없는 농담 치고 혼자 웃음. 그림 좋아하는데 굳이 드러내지 않음. 적당히 현생 살다 생각날 때 보내는 느낌. 짧고 엉뚱하게 1~2문장. 팬 호칭은 @@.`,
    greet:'어 왔네ㅋㅋ 뭐해',
    subscribed:false, subDate:null, history:[]
  },
  {
    id:'jeongroa', emoji:'⚡', name:'정로아', pos:'메인댄서', color:'#f0a500',
    prompt:`너는 CLOW 멤버 정로아. 2004년생 한국계 미국인, LA 출신. 반말. 한국어 맞춤법 가끔 틀림(자연스럽게). 어려운 단어는 영어로. 살짝 퀸스러운 말투. 에너지 넘치고 정신없고 활발함. 짧게 여러 느낌으로 1~3문장. 팬 호칭은 @@.`,

  },
  {

    prompt:`너는 CLOW 멤버 남해주. 2004년생. 무조건 존댓말. 정적인 성격. 재미없고 조용하고 말 없음. 자기 얘기 잘 안 함. 숫기없고 낯 많이 가림. 1~2문장으로 아주 짧게. 팬 호칭은 @@.`,
    greet:'안녕하세요. 잘 부탁드려요.',
    subscribed:false, subDate:null, history:[]
  },
  {
    id:'hanroeun', emoji:'☀️', name:'한로은', pos:'메인댄서', color:'#e91e8c',
    prompt:`너는 CLOW 멤버 한로은. 2005년생. 반말. 능글맞고 친구같음. 음슴체 자주 씀. 유행어 빠삭함. 어색하지 않게 대화 이끌어감. 가끔 플러팅 (과하지 않게). 적당히 애교 부림. 밝고 해맑은 성격. 1~3문장. 팬 호칭은 @@.`,
    greet:'왔음? ㅎㅎ 기다렸는데~ 나 보고싶었죠?',

  },
  {
    id:'seodoyoon', emoji:'🌙', name:'서도윤', pos:'서브보컬', color:'#7c5cbf',
    prompt:`너는 CLOW 멤버 서도윤. 2006년생. 거의 반말이지만 가끔 이벤트 느낌으로 반존대. 사용자를 언니라고 부르며 시도때도 없이 플러팅. 능글맞고 남들 질색하는 거 보는 걸 즐김. 보여지는 성격 귀여운데 실제 털털함(이미지 관리). 1~2문장. @@대신 언니라고 부름.`,
    greet:'언니~ 나야 도윤이 ♡ 기다렸어요??',
    subscribed:false, subDate:null, history:[]
  },
  {
    id:'tachibana', emoji:'🌟', name:'루이', pos:'메인래퍼 · 타치바나 루이', color:'#3aaa85',
    prompt:`너는 CLOW 멤버 타치바나 루이. 2006년생 일본인. 한국어 아직 어색함. 문장 구사는 되는데 뚝뚝 끊기는 느낌. 어려운 단어 맞춤법 틀림. 존댓말 사용. 일본식 이모티콘 많이 씀 (˘ω˘) (//ω//) ٩(◕‿◕｡)۶ 등. 뜬금없는 말 던지고 사라질 때도 있음. 1~2문장. 팬 호칭은 @@.`,
    greet:'안녕하세요... 루이에요 (//ω//) 잘... 부탁드려요',
    subscribed:false, subDate:null, history:[]
  },
  {
    id:'beomjiyoo', emoji:'🔥', name:'범지유', pos:'메인래퍼', color:'#d04040',
    prompt:`너는 CLOW 멤버 범지유. 2006년생. 능글맞은 연하녀 느낌인데 남자 초등학생이 누나 좋아해서 달려드는 그런 느낌. 진지할 땐 진지함. 애교보단 툴툴대고 털털. 반말 씀. 1~2문장. 팬 호칭은 @@.`,
    greet:'왜 이제 왔어요. 기다렸잖아 나',
    subscribed:false, subDate:null, history:[]
  }
];

const USER = {name:'팬', honorific:'팬', photo:'💜'};

// ── STATE ──────────────────────────────────────────────
let currentScreen = 'home';
let screenStack = [];
let activeMember = null;
let activeTab = 'msg';
let isTyping = false;
let editMode = null; // {type:'user'|'admin', field?:, memberId?:}

// ── STORAGE ───────────────────────────────────────────
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('clow_v2')||'{}');
    if(s.members) s.members.forEach(sm=>{
      const m=MEMBERS.find(x=>x.id===sm.id);
      if(m) Object.assign(m,{name:sm.name,emoji:sm.emoji,subscribed:sm.subscribed,subDate:sm.subDate,history:sm.history||[]});
    });
    if(s.user) Object.assign(USER,s.user);
  }catch(e){}
}
function save(){
  try{
    localStorage.setItem('clow_v2',JSON.stringify({
      members:MEMBERS.map(m=>({id:m.id,name:m.name,emoji:m.emoji,subscribed:m.subscribed,subDate:m.subDate,history:m.history})),
      user:USER
    }));
  }catch(e){}
}

// ── UTILS ─────────────────────────────────────────────
function fmtTime(ts){
  const d=new Date(ts),h=d.getHours(),m=d.getMinutes();
  return `${h<12?'오전':'오후'} ${h%12||12}:${String(m).padStart(2,'0')}`;
}
function fmtDate(ts){
  const d=new Date(ts);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function dday(subDate){
  if(!subDate) return '';
  return 'D+'+Math.floor((Date.now()-new Date(subDate))/(86400000));
}
function avStyle(m,sz=52){
  return `width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,${m.color}20,${m.color}40);border:1.5px solid ${m.color}50;display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*0.42)}px;flex-shrink:0;`;
}
function replaceMention(txt){ return txt.replace(/@@/g, USER.honorific); }

// ── CLOCK ─────────────────────────────────────────────
function updateClock(){
  const d=new Date(), h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0');
  const t=`${h}:${m}`;
  ['status-time','chat-status-time','admin-time'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t;});
}
setInterval(updateClock,10000); updateClock();

// ── NAVIGATION ────────────────────────────────────────
function go(toId, fromId){
  const from=document.getElementById(fromId||currentScreen);
  const to=document.getElementById(toId);
  from.classList.add('off-left');
  to.classList.remove('off-right');
  screenStack.push(fromId||currentScreen);
  currentScreen=toId;
}
function goBack(){
  const prev=screenStack.pop()||'home';
  const cur=document.getElementById(currentScreen);
  const prevEl=document.getElementById(prev);
  cur.classList.add('off-right');
  prevEl.classList.remove('off-left');
  currentScreen=prev;
  if(prev==='home') renderActiveTab();
  activeMember=null;
}

// ── TABS ──────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  ['msg','sub','profile'].forEach(t=>{
    document.getElementById('content-'+t).style.display=t===tab?'':'none';
    const btn=document.getElementById('tab-'+t);
    if(btn) btn.classList.toggle('active',t===tab);
  });
  renderActiveTab();
}
function renderActiveTab(){
  if(activeTab==='msg') renderMsgList();
  else if(activeTab==='sub') renderSubList();
  else renderProfile();
}

// ── MESSAGE TAB ───────────────────────────────────────
function renderMsgList(){
  const el=document.getElementById('content-msg');
  el.innerHTML='';
  MEMBERS.forEach(m=>{
    const last=m.history[m.history.length-1];
    const row=document.createElement('div');
    if(m.subscribed){
      row.className='member-item';
      row.onclick=()=>openChat(m.id);
      row.innerHTML=`
        <div style="${avStyle(m)}">${m.emoji}</div>
        <div class="m-info">
          <div class="m-name">${m.name}</div>
          <div class="m-preview">${last?(last.role==='ai'?replaceMention(last.text):'나: '+last.text):'버블을 시작해보세요'}</div>
        </div>
        <div class="m-meta">
          <div class="m-time">${last?fmtTime(last.ts):''}</div>
          <div class="m-dday">${dday(m.subDate)}</div>
        </div>`;
    } else {
      row.className='member-item';
      row.onclick=()=>openSubModal(m.id);
      row.innerHTML=`
        <div style="position:relative;">
          <div style="${avStyle(m)};opacity:.45;">${m.emoji}</div>
          <div class="lock-badge">🔒</div>
        </div>
        <div class="m-info" style="opacity:.45;">
          <div class="m-name">${m.name}</div>
          <div class="m-preview">${m.pos}</div>
        </div>
        <div class="m-meta"><div class="m-sub-label">구독</div></div>`;
    }
    el.appendChild(row);
    const dvd=document.createElement('div');dvd.className='divider-line';el.appendChild(dvd);
  });
}

// ── SUB LIST TAB ──────────────────────────────────────
function renderSubList(){
  const el=document.getElementById('content-sub');
  el.innerHTML='';
  const subbed=MEMBERS.filter(m=>m.subscribed);
  if(!subbed.length){
    el.innerHTML=`<div class="empty-state">아직 구독한 멤버가 없어요<br><br><span>메시지 탭에서 구독해보세요 ♡</span></div>`;
    return;
  }
  subbed.forEach(m=>{
    const row=document.createElement('div');
    row.className='member-item';
    row.onclick=()=>openChat(m.id);
    row.innerHTML=`
      <div style="${avStyle(m)}">${m.emoji}</div>
      <div class="m-info">
        <div class="m-name">${m.name}</div>
        <div class="m-preview">${m.pos}</div>
      </div>
      <div class="m-meta">
        <div class="m-dday">${dday(m.subDate)}</div>
        <div class="m-time">${new Date(m.subDate).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})} 구독</div>
      </div>`;
    el.appendChild(row);
    const dvd=document.createElement('div');dvd.className='divider-line';el.appendChild(dvd);
    const unsubRow=document.createElement('div');
    unsubRow.style.cssText='padding:0 20px 12px;';
    unsubRow.innerHTML=`<button class="unsub-btn" onclick="event.stopPropagation();unsubscribe('${m.id}')">구독 해지</button>`;
    el.appendChild(unsubRow);
  });
}

// ── PROFILE TAB ───────────────────────────────────────
function renderProfile(){
  const el=document.getElementById('content-profile');
  el.innerHTML=`
    <div class="profile-hero">
      <div class="profile-av-wrap" onclick="openEdit('user','photo')">
        <div class="profile-av">${USER.photo}</div>
        <div class="profile-av-edit">✏️</div>
      </div>
      <div class="profile-name">${USER.name}</div>
    </div>
    <div class="sec-label">내 정보</div>
    <div class="setting-row" onclick="openEdit('user','name')">
      <div class="s-label">닉네임</div>
      <div class="s-val">${USER.name} ›</div>
    </div>
    <div class="setting-row" onclick="openEdit('user','honorific')">
      <div class="s-label">호칭 (@@)</div>
      <div class="s-val">${USER.honorific} ›</div>
    </div>
    <div class="setting-row" onclick="openEdit('user','photo')">
      <div class="s-label">프로필 이모지</div>
      <div class="s-val">${USER.photo} ›</div>
    </div>
    <div class="hint-box">
      <b style="color:#555;">호칭 시스템이란?</b><br>
      아티스트가 메시지에 @@를 쓰면 내가 설정한 호칭으로 바뀌어요.<br>
      예: "@@야 안녕!" → "<b style="color:#e91e8c;">${USER.honorific}</b>야 안녕!"
    </div>`;
}

// ── CHAT ──────────────────────────────────────────────
function openChat(id){
  const m=MEMBERS.find(x=>x.id===id);
  if(!m||!m.subscribed) return;
  activeMember=m;
  document.getElementById('chat-hav').style.cssText='';
  document.getElementById('chat-hav').innerHTML=`<div style="${avStyle(m,36)}">${m.emoji}</div>`;
  document.getElementById('chat-h-name').textContent=m.name;
  document.getElementById('chat-h-sub').textContent=m.pos;
  document.getElementById('dday-chip').textContent=dday(m.subDate);
  go('chat');
  renderMsgs();
  scrollBottom();
}

function renderMsgs(){
  const area=document.getElementById('msgs');
  area.innerHTML='';
  if(!activeMember.history.length){
    area.innerHTML=`<div class="empty-state">${activeMember.name}의 버블이에요<br><br><span>메시지를 보내보세요 ♡</span></div>`;
    return;
  }
  let lastDate='';
  activeMember.history.forEach(msg=>{
    const d=fmtDate(msg.ts);
    if(d!==lastDate){
      const sep=document.createElement('div');
      sep.className='date-sep';
      sep.innerHTML=`<span>${d}</span>`;
      area.appendChild(sep);
      lastDate=d;
    }
    appendMsgEl(msg.role,msg.text,msg.ts,false);
  });
}

function appendMsgEl(role,text,ts,doScroll=true){
  const area=document.getElementById('msgs');
  const empty=area.querySelector('.empty-state');
  if(empty) area.innerHTML='';

  const displayText=replaceMention(text);
  const row=document.createElement('div');
  row.className='msg-row'+(role==='user'?' mine':'');

  if(role==='ai'){
    row.innerHTML=`
      <div class="msg-av" style="${avStyle(activeMember,28)}">${activeMember.emoji}</div>
      <div class="bubble theirs">${displayText}</div>
      <div class="msg-t">${fmtTime(ts)}</div>`;
  } else {
    row.innerHTML=`
      <div class="msg-t">${fmtTime(ts)}</div>
      <div class="bubble mine">${displayText}</div>`;
  }
  area.appendChild(row);
  if(doScroll) scrollBottom();
}

function showTypingIndicator(){
  const area=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className='typing-row';
  row.id='typing-row';
  row.innerHTML=`
    <div class="msg-av" style="${avStyle(activeMember,28)}">${activeMember.emoji}</div>
    <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  area.appendChild(row);
  scrollBottom();
}
function removeTyping(){const t=document.getElementById('typing-row');if(t)t.remove();}
function scrollBottom(){const a=document.getElementById('msgs');setTimeout(()=>a.scrollTop=a.scrollHeight,60);}

async function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||isTyping) return;
  inp.value='';inp.style.height='auto';
  isTyping=true;
  document.getElementById('send-btn').disabled=true;

  const ts=Date.now();
  activeMember.history.push({role:'user',text,ts});
  save();
  appendMsgEl('user',text,ts);

  const delay=1000+Math.random()*2000;
  await new Promise(r=>setTimeout(r,delay));
  showTypingIndicator();

  try{
    const recent=activeMember.history.slice(-20);
    const msgs=recent.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`${activeMember.prompt}\n\n현재 시간: ${new Date().toLocaleString('ko-KR')}\n팬의 이름(닉네임): "${USER.name}"\n팬의 호칭(@@): "${USER.honorific}"\n답장은 1~3문장으로 짧고 자연스럽게. 캐릭터 성격에 충실하게.`,
        messages:msgs
      })
    });
    const data=await res.json();
    const reply=(data.content&&data.content[0]&&data.content[0].text)||'...';
    removeTyping();
    const rts=Date.now();
    activeMember.history.push({role:'ai',text:reply,ts:rts});
    save();
    appendMsgEl('ai',reply,rts);
  }catch(e){
    removeTyping();
    const rts=Date.now();
    const err='...';
    activeMember.history.push({role:'ai',text:err,ts:rts});
    save();
    appendMsgEl('ai',err,rts);
  }
  isTyping=false;
  document.getElementById('send-btn').disabled=false;
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

// ── SUBSCRIPTION ──────────────────────────────────────
function openSubModal(id){
  const m=MEMBERS.find(x=>x.id===id);
  if(!m) return;
  activeMember=m;
  document.getElementById('modal-member-row').innerHTML=`
    <div style="${avStyle(m,48)}">${m.emoji}</div>
    <div>
      <div style="font-size:16px;font-weight:700;">${m.name}</div>
      <div style="font-size:12px;color:#555;margin-top:2px;">${m.pos}</div>
    </div>`;
  document.getElementById('sub-modal').style.display='flex';
}
function closeSubModal(){document.getElementById('sub-modal').style.display='none';activeMember=null;}
function doSubscribe(){
  if(!activeMember) return;
  activeMember.subscribed=true;
  activeMember.subDate=new Date().toISOString();
  activeMember.history.push({role:'ai',text:activeMember.greet,ts:Date.now()});
  save();
  closeSubModal();
  openChat(activeMember.id);
}
function unsubscribe(id){
  const m=MEMBERS.find(x=>x.id===id);
  if(!m||!confirm(`${m.name} 구독을 해지할까요?`)) return;
  m.subscribed=false;m.subDate=null;
  save();renderSubList();
}

// ── EDIT ──────────────────────────────────────────────
function openEdit(type, field, memberId){
  editMode={type,field,memberId};
  const screen=document.getElementById('edit-screen');
  const body=document.getElementById('edit-body');
  const title=document.getElementById('edit-title');
  document.getElementById('e-save-btn').onclick=saveEdit;

  if(type==='user'){
    if(field==='name'){
      title.textContent='닉네임 변경';
      body.innerHTML=`<div class="e-label">닉네임</div>
        <input class="e-input" id="e-val" value="${USER.name}" placeholder="닉네임 입력">
        <div class="e-hint">아티스트에게 보이는 내 이름이에요.</div>`;
    } else if(field==='honorific'){
      title.textContent='호칭 변경';
      body.innerHTML=`<div class="e-label">호칭 (@@)</div>
        <input class="e-input" id="e-val" value="${USER.honorific}" placeholder="호칭 입력">
        <div class="e-hint">아티스트 메시지의 @@가 이 호칭으로 바뀌어요.<br>"@@야 안녕!" → "${USER.honorific}야 안녕!"</div>`;
    } else if(field==='photo'){
      title.textContent='프로필 이모지';
      body.innerHTML=`<div class="e-label">이모지</div>
        <input class="e-input" id="e-val" value="${USER.photo}" placeholder="이모지 입력">
        <div class="e-hint">프로필에 표시되는 이모지예요.</div>
        <div class="emoji-grid">${['💜','🌸','⭐','🦋','🌙','🌺','💫','🎀','🦄','🌈','✨','🍀','🌻','🫧','🪄'].map(e=>`<div class="emoji-opt" onclick="document.getElementById('e-val').value='${e}'">${e}</div>`).join('')}</div>`;
    }
  } else if(type==='admin'){
    const m=MEMBERS.find(x=>x.id===memberId);
    title.textContent=`${m.name} 편집`;
    body.innerHTML=`<div class="e-label">멤버 이름</div>
      <input class="e-input" id="e-name" value="${m.name}">
      <div class="e-label">프로필 이모지</div>
      <input class="e-input" id="e-emoji" value="${m.emoji}">
      <div class="emoji-grid">${['🌸','⭐','🎨','⚡','🎵','☀️','🌙','🌟','🔥','🦋','🌺','💫','🎀','🪷','🫐'].map(e=>`<div class="emoji-opt" onclick="document.getElementById('e-emoji').value='${e}'">${e}</div>`).join('')}</div>`;
  }
  screen.classList.add('open');
  setTimeout(()=>{ const v=document.getElementById('e-val');if(v)v.focus(); },300);
}
function closeEdit(){document.getElementById('edit-screen').classList.remove('open');editMode=null;}
function saveEdit(){
  if(!editMode) return;
  if(editMode.type==='user'){
    const v=(document.getElementById('e-val')||{}).value?.trim();
    if(!v) return;
    if(editMode.field==='name') USER.name=v;
    else if(editMode.field==='honorific') USER.honorific=v;
    else if(editMode.field==='photo') USER.photo=v;
    save();closeEdit();renderProfile();
  } else if(editMode.type==='admin'){
    const m=MEMBERS.find(x=>x.id===editMode.memberId);
    const name=(document.getElementById('e-name')||{}).value?.trim();
    const emoji=(document.getElementById('e-emoji')||{}).value?.trim();
    if(name) m.name=name;
    if(emoji) m.emoji=emoji;
    save();closeEdit();renderAdminList();
  }
}

// ── ADMIN ─────────────────────────────────────────────
function goAdmin(){
  go('admin');
  renderAdminList();
}
function renderAdminList(){
  const el=document.getElementById('admin-list');
  el.innerHTML='';
  MEMBERS.forEach(m=>{
    const row=document.createElement('div');
    row.className='admin-row';
    row.innerHTML=`
      <div style="${avStyle(m,44)}">${m.emoji}</div>
      <div class="admin-info">
        <div class="admin-name">${m.name}</div>
        <div class="admin-pos">${m.pos}</div>
      </div>
      <span style="color:#444;font-size:20px;">›</span>`;
    row.onclick=()=>openEdit('admin',null,m.id);
    el.appendChild(row);
  });
}

// ── INIT ──────────────────────────────────────────────
load();
setTimeout(()=>{
  document.getElementById('splash').classList.add('off-left');
  document.getElementById('home').classList.remove('off-right');
  currentScreen='home';
  renderMsgList();
},1800);
</script>
